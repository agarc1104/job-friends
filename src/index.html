<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Aplicación Supabase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>Portal de CV</h1>
            <p class="app-subtitle">Sube tu CV y encuentra oportunidades laborales</p>
        </header>

        <main class="container">
            <div class="card">
                <div class="card-header">
                    <svg class="card-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="12" y1="18" x2="12" y2="12"/>
                        <line x1="9" y1="15" x2="15" y2="15"/>
                    </svg>
                    <h2>Sube tu archivo PDF</h2>
                </div>
                <div class="upload-zone">
                    <label for="fileInput" class="file-label">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 16 12 12 8 16"/>
                            <line x1="12" y1="12" x2="12" y2="21"/>
                            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
                        </svg>
                        <span>Seleccionar archivo PDF</span>
                    </label>
                    <input type="file" id="fileInput" accept=".pdf">
                </div>
                <div class="upload-actions">
                    <button id="uploadButton" class="btn btn-primary" disabled>Cargar Archivo</button>
                </div>
                <progress id="progressBar" max="100" value="0"></progress>
            </div>

            <div class="card">
                <section id="job-search">
                    <div class="card-header">
                        <svg class="card-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <h2>Búsqueda de empleo</h2>
                    </div>

                    <div class="form-group">
                        <label for="emailInput">Tu correo electrónico</label>
                        <input type="email" id="emailInput" placeholder="usuario@ejemplo.com" required>
                    </div>

                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Buscar vacantes...">
                        <button id="searchButton" class="btn btn-primary">Buscar</button>
                    </div>

                    <div class="table-wrapper">
                        <table id="jobsTable">
                            <thead>
                                <tr>
                                    <th>Vacante</th>
                                    <th>Sitio web</th>
                                    <th>Enlace para aplicar</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Los resultados de búsqueda se insertarán aquí -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script type="module" src="./index.js"></script>
</body>
</html>
