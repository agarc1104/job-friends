name: jobfriends_mobile
description: Frontend movil Flutter para JobFriends con monetizacion AdMob.
publish_to: none
version: 1.1.0+11

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  file_picker: ^8.0.7
  flutter_dotenv: ^5.1.0
  google_generative_ai: ^0.4.6
  google_mobile_ads: ^5.1.0
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  html: ^0.15.5
  http: ^1.2.2
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.8.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assests/Logo2-removebg-preview.png
  adaptive_icon_foreground: assests/Logo2-removebg-preview.png
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.dev
    - .env.qa
    - .env.prod