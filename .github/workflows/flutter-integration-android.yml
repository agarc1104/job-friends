name: Flutter Integration Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'mobile_app/**'
      - '.github/workflows/flutter-integration-android.yml'
  pull_request:
    paths:
      - 'mobile_app/**'

jobs:
  integration-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: mobile_app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: mobile_app
        run: flutter analyze

      - name: Run integration test on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          target: google_apis
          script: |
            cd mobile_app
            flutter test integration_test/app_smoke_test.dart -d emulator-5554

      - name: Run fallback smoke test
        if: ${{ always() }}
        working-directory: mobile_app
        run: flutter test test/smoke_shell_test.dart
